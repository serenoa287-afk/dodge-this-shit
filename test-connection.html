<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .info { background: #e3f2fd; padding: 10px; border-radius: 5px; margin: 10px 0; }
        .success { background: #e8f5e9; padding: 10px; border-radius: 5px; margin: 10px 0; }
        .error { background: #ffebee; padding: 10px; border-radius: 5px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>WebSocket Connection Test</h1>
    
    <div id="info" class="info">
        <h3>Connection Information:</h3>
        <p><strong>Current Host:</strong> <span id="current-host">Loading...</span></p>
        <p><strong>WebSocket URL:</strong> <span id="ws-url">Loading...</span></p>
        <p><strong>Status:</strong> <span id="status">Not connected</span></p>
    </div>
    
    <button onclick="testConnection()">Test WebSocket Connection</button>
    
    <div id="result"></div>
    
    <script>
        function updateConnectionInfo() {
            const host = window.location.hostname;
            const port = 8080;
            const wsUrl = `ws://${host}:${port}`;
            
            document.getElementById('current-host').textContent = host;
            document.getElementById('ws-url').textContent = wsUrl;
            
            return { host, wsUrl };
        }
        
        function testConnection() {
            const { wsUrl } = updateConnectionInfo();
            const resultDiv = document.getElementById('result');
            const statusSpan = document.getElementById('status');
            
            statusSpan.textContent = 'Connecting...';
            statusSpan.style.color = 'orange';
            
            resultDiv.innerHTML = `<div class="info">Attempting to connect to: ${wsUrl}</div>`;
            
            try {
                const ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    statusSpan.textContent = 'Connected!';
                    statusSpan.style.color = 'green';
                    resultDiv.innerHTML += `<div class="success">✅ Successfully connected to WebSocket server!</div>`;
                    ws.close();
                };
                
                ws.onerror = (error) => {
                    statusSpan.textContent = 'Connection failed';
                    statusSpan.style.color = 'red';
                    resultDiv.innerHTML += `<div class="error">❌ Failed to connect to WebSocket server.</div>`;
                    resultDiv.innerHTML += `<div class="info">Make sure the WebSocket server is running on port 8080.</div>`;
                };
                
                ws.onclose = () => {
                    if (statusSpan.textContent !== 'Connected!') {
                        statusSpan.textContent = 'Connection closed';
                    }
                };
                
                // Timeout after 5 seconds
                setTimeout(() => {
                    if (ws.readyState === WebSocket.CONNECTING) {
                        ws.close();
                        statusSpan.textContent = 'Timeout';
                        statusSpan.style.color = 'red';
                        resultDiv.innerHTML += `<div class="error">⏰ Connection timeout after 5 seconds.</div>`;
                    }
                }, 5000);
                
            } catch (error) {
                statusSpan.textContent = 'Error';
                statusSpan.style.color = 'red';
                resultDiv.innerHTML += `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }
        
        // Initialize on page load
        updateConnectionInfo();
    </script>
</body>
</html>
