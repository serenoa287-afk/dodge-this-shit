version: '3.8'

services:
  dodge-game:
    build: .
    container_name: dodge-this-shit-game
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    volumes:
      - ./logs:/app/logs
    networks:
      - game-network

networks:
  game-network:
    driver: bridge